spring:
  application:
    name: aggregator

  config:
    import: "configserver:"
  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server
      fail-fast: true
      retry:
        useRandomPolicy: true
        max-interval: 6000

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://discovery-server:8761/eureka/}  # http://${eureka.instance.hostname:localhost}:${eureka.instance.port:8761}/eureka/
  #    register-with-eureka: true
  #    fetch-registry: true
  #    initial-instance-info-replication-interval-seconds: 5
  #    instance-info-replication-interval-seconds: 5
  #    registry-fetch-interval-seconds: 3
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"
    leaseRenewalIntervalInSeconds: 10