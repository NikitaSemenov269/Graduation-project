spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:stats-db}:${DB_PORT:5432}/${DB_NAME:statsdb}
    username: ${DB_USER:dbuser}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

analyzer:
  kafka:
    user-action-consumer-props:
      bootstrap.servers: "localhost:9092"
      group.id: "analyzer-group"
      key.deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value.deserializer: ru.yandex.practicum.deserializer.UserActionDeserializer
      enable.auto.commit: "false"
      auto.offset.reset: "earliest"
    event-similarity-consumer-props:
      bootstrap.servers: "localhost:9092"
      group.id: "analyzer-group"
      key.deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value.deserializer: ru.yandex.practicum.deserializer.EventSimilarityDeserializer
      enable.auto.commit: "false"
      auto.offset.reset: "earliest"
    user-actions-topic: "stats.user-actions.v1"
    events-similarity-topic: "stats.events-similarity.v1"