aggregator:
  kafka:
    producerProps:
      bootstrap.servers: "localhost:9092"
      client.id: "aggregator-client"
      key.serializer: org.apache.kafka.common.serialization.LongSerializer
      value.serializer: ru.yandex.practicum.serializer.GeneralAvroSerializer
      acks: "all"
      retries: 3
      enable.idempotence: true
    consumerProps:
      bootstrap.servers: "localhost:9092"
      group.id: "aggregator-group"
      key.deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value.deserializer: ru.yandex.practicum.deserializer.UserActionDeserializer
      enable.auto.commit: "false"
      auto.offset.reset: "earliest"
    userActionsTopic: "stats.user-actions.v1"
    eventsSimilarityTopic: "stats.events-similarity.v1"