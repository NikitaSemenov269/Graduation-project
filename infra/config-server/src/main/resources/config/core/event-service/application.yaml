spring:
  datasource:
    url: jdbc:postgresql://event-db:5432/eventdb
    username: dbuser
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        default_schema: public
        format_sql: false

logging:
  level:
    ru.yandex.practicum: DEBUG
    org.springframework.web.client: DEBUG
    feign: DEBUG

stats-server:
  name: stats-server