spring:
  datasource:
    url: jdbc:postgresql://user-db:5432/userdb
    username: dbuser
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        default_schema: public
        format_sql: false

logging:
  level:
    ru.practicum.practicum: DEBUG